name: go-app-deploy

on:
  push:
    branches:
      - main

env:
  APP_NAME: app
  DEPLOY_PATH: /var/www/app

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      artifact-name: go-build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Tidy module
        run: go mod tidy

      - name: Build app
        run: go build -o app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-build
          path: app

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: go-build
          path: .

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Upload ke VPS
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "
            mkdir -p $DEPLOY_PATH
          "

          scp -i ~/.ssh/id_rsa app \
            ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:$DEPLOY_PATH/app

      - name: Set permission + restart PM2
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "
            chmod +x $DEPLOY_PATH/app
            pm2 describe $APP_NAME > /dev/null \
            && pm2 restart $APP_NAME \
            || pm2 start $DEPLOY_PATH/app --name $APP_NAME
            pm2 save
          "

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/id_rsa
        