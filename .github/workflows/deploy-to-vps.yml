name: go-app-deploy

on:
  push:
    branches:
      - main

env:
  APP_NAME: app
  DEPLOY_PATH: /var/www/app
  TMP_PATH: /tmp/app_new

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Tidy module
        run: go mod tidy

      - name: Build app
        run: go build -o app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-build
          path: app

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: go-build
          path: .

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # 🚀 Upload binary ke VPS (tmp dulu)
      - name: Upload binary to VPS
        run: |
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no app \
          ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:${{ env.TMP_PATH }}

      # 🔄 Deploy + backup versi lama
      - name: Deploy & backup old version
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "
            set -e

            sudo mkdir -p ${{ env.DEPLOY_PATH }}

            # backup binary lama (kalau ada)
            if [ -f ${{ env.DEPLOY_PATH }}/app ]; then
              sudo mv ${{ env.DEPLOY_PATH }}/app ${{ env.DEPLOY_PATH }}/app_backup_\$(date +%s)
            fi

            # pindahkan binary baru
            sudo mv ${{ env.TMP_PATH }} ${{ env.DEPLOY_PATH }}/app

            # set permission
            sudo chmod +x ${{ env.DEPLOY_PATH }}/app
          "

      # 🔁 Restart app (FORCE reload biar pasti pakai binary baru)
      - name: Restart app (PM2 - force)
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "
            set -e

            # kill port biar ga ada zombie
            fuser -k 8080/tcp || true

            # hapus semua process lama
            pm2 delete ${{ env.APP_NAME }} || true

            # start fresh
            pm2 start ${{ env.DEPLOY_PATH }}/app --name ${{ env.APP_NAME }}
            
            pm2 save
          "

      # 🔍 Verifikasi deploy (biar yakin update)
      - name: Verify app
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "
            echo '=== FILE INFO ==='
            ls -l ${{ env.DEPLOY_PATH }}/app

            echo '=== RESPONSE ==='
            curl -s localhost:8080
          "

      # 🧹 Cleanup SSH key
      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/id_ed25519