name: go-app-deploy

on:
  push:
    branches:
      - main

env:
  APP_NAME: app
  DEPLOY_PATH: /var/www/app

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Tidy module
        run: go mod tidy

      - name: Build app
        run: go build -o app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-build
          path: app

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: go-build
          path: .

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Upload binary to VPS (tmp)
        run: |
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no app \
          ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:/tmp/app

      - name: Move & set permission (sudo)
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "
            sudo mkdir -p ${{ env.DEPLOY_PATH }}
            sudo mv /tmp/app ${{ env.DEPLOY_PATH }}/app
            sudo chmod +x ${{ env.DEPLOY_PATH }}/app
          "

      - name: Restart app (PM2)
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "
            pm2 describe ${{ env.APP_NAME }} > /dev/null \
              && pm2 restart ${{ env.APP_NAME }} \
              || pm2 start ${{ env.DEPLOY_PATH }}/app --name ${{ env.APP_NAME }}
            pm2 save
          "

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/id_ed25519